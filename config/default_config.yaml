    name: "PLA Filament RGB"
    unit: "spools"
  - id: "printbed_g1"
    name: "Glass Print Bed 200mm"
    unit: "units"
  - id: "nozzle_cu"
    name: "Copper Nozzle"
    unit: "units"
  - id: "motor_nema17"
    name: "NEMA 17 Motor"
    unit: "units"
  - id: "pcb_board"
    name: "Control PCB Board"
    unit: "units"

